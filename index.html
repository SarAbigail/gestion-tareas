<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Listado de Tareas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    input,
    button {
      padding: 8px;
      margin: 5px 0;
    }

    ul {
      margin-top: 20px;
    }

    li {
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

  <h2>Agregar Tarea</h2>

  <form id="taskForm">
    <input type="text" id="taskInput" placeholder="Escribe una tarea..." required>
    <button type="submit">Agregar</button>
  </form>

  <ul id="taskList"></ul>

  <script>
    const form = document.getElementById('taskForm');
    const input = document.getElementById('taskInput');
    const list = document.getElementById('taskList');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const taskText = input.value.trim();
      if (taskText === '') return;

      const li = document.createElement('li');
      li.textContent = taskText;

      list.appendChild(li);
      input.value = '';
    });
  </script>

</body>

</html>
